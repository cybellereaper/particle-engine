engine:
  tick-budget-nanos: 1500000
  max-active-effects: 2000
  default-view-distance: 48.0
  lod-distance-threshold: 24.0
  lod-throttle-factor: 2
  deterministic-random-seed: 1337
  collision-sampling-step: 0.35

storage:
  named-effects-file: named-effects.yml

debug:
  enabled-by-default: false

scripts:
  # PEScript instruction budget per execution. Scripts that run longer than
  # this without yielding via `wait` will abort with a runtime error.
  instruction-budget: 1000000
  # Optional default world name used when scripts call at(x, y, z) with no
  # explicit world. If unset, scripts must always pass a world name.
  default-world: ""
