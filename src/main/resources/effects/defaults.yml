effects:
  trail_smoke:
    family: TRAIL
    particle: CLOUD
    count: 2
    lifetimeTicks: 100
    anchor:
      type: PLAYER
      selector: self
      space: LOCAL
    emitters:
      - shape: LINE
        rate: 1
        points: 4
        from: [0.0, 0.0, 0.0]
        to: [0.0, 0.2, -0.8]
    timeline:
      durationTicks: 100
      loop: true
      keyframes:
        - tick: 0
          params: {scale: 0.4}
        - tick: 60
          params: {scale: 1.0}

  orbital_arcane:
    family: ORBITAL
    particle: ENCHANT
    count: 1
    lifetimeTicks: 200
    anchor:
      type: PLAYER
      selector: self
      space: LOCAL
    emitters:
      - shape: CIRCLE
        rate: 1
        points: 24
        radius: 1.3
    modifiers:
      - type: SPIN_YAW
        speed: 4.0

  pulsing_aura:
    family: AURA
    particle: HEART
    count: 1
    lifetimeTicks: 200
    anchor:
      type: PLAYER
      selector: self
      space: LOCAL
    emitters:
      - shape: SPHERE
        rate: 1
        points: 32
        radius: 1.0
    modifiers:
      - type: PULSE
        amplitude: 0.4
        frequency: 0.18
      - type: SPIN_YAW
        speed: 3.0

  drifting_smoke:
    family: TRAIL
    particle: CLOUD
    count: 1
    lifetimeTicks: 80
    anchor:
      type: PLAYER
      selector: self
      space: LOCAL
    emitters:
      - shape: SPHERE
        rate: 1
        points: 18
        radius: 0.5
    modifiers:
      - type: NOISE
        amplitude: 0.4
        frequency: 0.12
      - type: GRAVITY
        strength: -0.025
